
<html >
<head>
    <title>Calculator</title>
<style>

body{
    background:rgb(255, 255, 255);
    justify-content:center;
     display:flex;
    align-items:center;
   
}

.calculator{
    width:320px;
    background:rgb(255, 192, 46);
    padding:30px;
    border-radius:20px;
            
}

h1{
    color:rgb(0, 0, 0);
    text-align:center;
    margin-bottom:20px;
}

#display{
    width:100%;
    height:60px;
    background:rgb(255, 255, 255);
    border:5px solid #a6a6a6;
    color:rgb(0, 0, 0);
    font-size:20px;
    text-align:left;
    margin-bottom:30;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:20px;
}

button{
    height:70px;
    border:none;
    border-radius:50%;
    font-size:30px;
    cursor:pointer;
}

.number{
    background:#24009c;
    color:rgb(255, 255, 255);
}

.operator{
    background:#000000;
    color:rgba(255, 255, 255, 0.753);
}

.equal{
    background:rgb(235, 0, 0);
    color:white;
}

</style>
</head>

<body>

<div class="calculator">

    <h1>CALCULATOR</h1>
    
    <input type="text" id="display" readonly>

    <div class="buttons">

        <button class="number" onclick="clearDisplay()">C</button>
        <button class="number" onclick="addValue('(')">(</button>
        <button class="number" onclick="addValue(')')">)</button>
        <button class="operator" onclick="addValue('/')">÷</button>

        <button class="number" onclick="addValue('7')">7</button>
        <button class="number" onclick="addValue('8')">8</button>
        <button class="number" onclick="addValue('9')">9</button>
        <button class="operator" onclick="addValue('*')">×</button>

        <button class="number" onclick="addValue('4')">4</button>
        <button class="number" onclick="addValue('5')">5</button>
        <button class="number" onclick="addValue('6')">6</button>
        <button class="operator" onclick="addValue('-')">−</button>

        <button class="number" onclick="addValue('1')">1</button>
        <button class="number" onclick="addValue('2')">2</button>
        <button class="number" onclick="addValue('3')">3</button>
        <button class="operator" onclick="addValue('+')">+</button>

        <button class="number" onclick="addValue('.')">.</button>
        <button class="number" onclick="addValue('0')">0</button>
        <button class="number" onclick="deleteLast()">⌫</button>
        <button class="equal" onclick="calculate()">=</button>

    </div>

</div>

<script>

function addValue(value){
    document.getElementById("display").value += value;
}

function calculate(){
    let result = eval(document.getElementById("display").value);
    document.getElementById("display").value = result;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function deleteLast(){
    let display = document.getElementById("display");
    display.value = display.value.slice(0,-1);
}

</script>

</body>
</html>
